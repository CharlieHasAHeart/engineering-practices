services:
  nginx:
    image: nginx:stable
    container_name: <project-slug>-nginx-dev
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - app_net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: <project-slug>-web-dev
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    command: pnpm dev --host 0.0.0.0 --port 3000
    environment:
      HOME: /tmp
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_vite_cache:/app/node_modules/.vite
    expose:
      - "3000"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: <project-slug>-api-dev
    environment:
      DATABASE_URL: postgresql+psycopg://<database-user>:<database-password>@db:5432/<database-name>
    volumes:
      - ./apps/api:/app
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net

  db:
    image: postgres:16
    container_name: <project-slug>-db-dev
    environment:
      POSTGRES_DB: <database-name>
      POSTGRES_USER: <database-user>
      POSTGRES_PASSWORD: <database-password>
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U <database-user> -d <database-name>"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  web_node_modules:
    name: <project-slug>-web-node-modules-dev
  web_vite_cache:
    name: <project-slug>-web-vite-cache-dev
  postgres_data:
    name: <project-slug>-postgres-data-dev

networks:
  app_net:
    name: <project-slug>-app-net
    driver: bridge
