services:
  test:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: <project-slug>-test
    command: sh -c "<migration-command> && <test-seed-command> && <test-command>"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://<database-user>:<database-password>@db:5432/<database-name-test>
      CI: "true"
    networks:
      - app_net

  db:
    image: postgres:16
    container_name: <project-slug>-db-test
    environment:
      POSTGRES_DB: <database-name-test>
      POSTGRES_USER: <database-user>
      POSTGRES_PASSWORD: <database-password>
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U <database-user> -d <database-name-test>"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: <project-slug>-postgres-data-test

networks:
  app_net:
    name: <project-slug>-app-net-test
    driver: bridge
