services:
  nginx:
    image: <private-registry>/nginx:<pinned-version>
    container_name: <project-slug>-nginx-prod
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3015:80"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  web:
    image: <private-registry>/<project-slug>-web:<pinned-version>
    container_name: <project-slug>-web-prod
    environment:
      CI: "true"
    expose:
      - "3000"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  api:
    image: <private-registry>/<project-slug>-api:<pinned-version>
    container_name: <project-slug>-api-prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CI: "true"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  db:
    image: <private-registry>/postgres:<pinned-version>
    container_name: <project-slug>-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    image: <private-registry>/<project-slug>-api:<pinned-version>
    command: <migration-command>
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CI: "true"
    networks:
      - app_net
    profiles:
      - tools

volumes:
  postgres_data:
    name: <project-slug>-postgres-data-prod

networks:
  app_net:
    name: <project-slug>-app-net
    driver: bridge
